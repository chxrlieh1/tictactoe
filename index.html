<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tic Tac Toe</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #0a0a0a;
      font-family: 'Segoe UI', sans-serif;
      color: #ccc;
    }

    h1 {
      font-size: 2.5rem;
      margin-bottom: 1rem;
      letter-spacing: 4px;
      text-transform: uppercase;
      color: #ff2d78;
      text-shadow: 0 0 8px #ff2d78, 0 0 22px #ff2d78, 0 0 45px rgba(255,45,120,0.35);
    }

    #status {
      font-size: 1.2rem;
      margin-bottom: 1.5rem;
      min-height: 1.5em;
      color: #666;
    }

    #mode-indicator {
      font-size: 0.75rem;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: #2a2a2a;
      margin-bottom: 0.6rem;
    }

    #board {
      display: grid;
      grid-template-columns: repeat(3, 110px);
      grid-template-rows: repeat(3, 110px);
      gap: 8px;
    }

    .cell {
      position: relative;
      background: #141414;
      border: 1px solid #1e1e1e;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 3rem;
      font-weight: bold;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s, transform 0.1s;
      user-select: none;
    }

    .cell:hover:not(.taken):not(.blocked) {
      background: #1c1c1c;
      border-color: #2e2e2e;
      transform: scale(1.05);
    }

    .cell.blocked { cursor: default; }

    .cell.x {
      color: #ff2d78;
      text-shadow: 0 0 10px #ff2d78, 0 0 22px rgba(255,45,120,0.5);
    }

    .cell.o {
      color: #00e5ff;
      text-shadow: 0 0 10px #00e5ff, 0 0 22px rgba(0,229,255,0.5);
    }

    .cell::before {
      content: attr(data-key);
      position: absolute;
      top: 7px;
      left: 9px;
      font-size: 0.7rem;
      font-weight: normal;
      color: #222;
      pointer-events: none;
      transition: opacity 0.15s;
    }

    .cell.taken::before,
    .cell.blocked::before { opacity: 0; }

    @keyframes winning-pulse {
      0%, 100% { transform: scale(1); }
      50%       { transform: scale(1.08); }
    }

    .cell.winning { animation: winning-pulse 0.6s ease-in-out infinite; }

    .cell.winning.x {
      background: rgba(255, 45, 120, 0.12);
      border-color: rgba(255, 45, 120, 0.5);
      box-shadow: 0 0 28px rgba(255,45,120,0.8), inset 0 0 14px rgba(255,45,120,0.15);
    }

    .cell.winning.o {
      background: rgba(0, 229, 255, 0.12);
      border-color: rgba(0, 229, 255, 0.5);
      box-shadow: 0 0 28px rgba(0,229,255,0.8), inset 0 0 14px rgba(0,229,255,0.15);
    }

    @keyframes pop-in {
      0%   { transform: scale(0) rotate(-20deg); opacity: 0; }
      55%  { transform: scale(1.35) rotate(6deg); opacity: 1; }
      75%  { transform: scale(0.88) rotate(-3deg); }
      100% { transform: scale(1) rotate(0deg); opacity: 1; }
    }

    .cell .symbol {
      display: inline-block;
      animation: pop-in 0.4s cubic-bezier(0.34, 1.56, 0.64, 1) both;
    }

    #reset {
      margin-top: 1.8rem;
      padding: 0.65rem 2.2rem;
      font-size: 1rem;
      border: 1px solid #ff2d78;
      border-radius: 8px;
      background: transparent;
      color: #ff2d78;
      cursor: pointer;
      letter-spacing: 1px;
      transition: background 0.15s, box-shadow 0.15s, transform 0.1s;
      text-shadow: 0 0 8px rgba(255,45,120,0.4);
    }

    #reset:hover {
      background: rgba(255,45,120,0.08);
      box-shadow: 0 0 14px rgba(255,45,120,0.35);
      transform: scale(1.04);
    }

    #scoreboard {
      display: flex;
      gap: 2.5rem;
      margin-bottom: 1.5rem;
      font-size: 1rem;
    }

    .score-box { text-align: center; }
    .score-box .label { color: #333; font-size: 0.8rem; letter-spacing: 1px; text-transform: uppercase; }
    .score-box .value { font-size: 1.8rem; font-weight: bold; }
    .score-box.x-score .value {
      color: #ff2d78;
      text-shadow: 0 0 8px rgba(255,45,120,0.4);
    }
    .score-box.o-score .value {
      color: #00e5ff;
      text-shadow: 0 0 8px rgba(0,229,255,0.4);
    }
    .score-box.tie-score .value { color: #444; }

    /* Mode selection overlay */
    #mode-screen {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.75);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 100;
    }

    @keyframes card-in {
      0%   { transform: scale(0.82) translateY(24px); opacity: 0; }
      100% { transform: scale(1)    translateY(0);    opacity: 1; }
    }

    @keyframes card-out {
      0%   { transform: scale(1)    translateY(0);    opacity: 1; }
      18%  { transform: scale(1.06) translateY(-6px); opacity: 1; }
      100% { transform: scale(0)    translateY(50px); opacity: 0; }
    }

    .mode-card {
      background: #111;
      border: 1px solid #222;
      border-radius: 24px;
      padding: 2.8rem 3rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2rem;
      box-shadow: 0 24px 64px rgba(0,0,0,0.8);
      animation: card-in 0.38s cubic-bezier(0.34, 1.45, 0.64, 1) both;
    }

    .mode-card.dismissing {
      animation: card-out 0.42s cubic-bezier(0.4, 0, 0.8, 1) both;
      pointer-events: none;
    }

    .mode-title {
      font-size: 2rem;
      letter-spacing: 4px;
      text-transform: uppercase;
      color: #ff2d78;
      text-shadow: 0 0 8px #ff2d78, 0 0 22px #ff2d78, 0 0 45px rgba(255,45,120,0.35);
    }

    .mode-card h2 {
      font-size: 1.15rem;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: #333;
    }

    .mode-buttons {
      display: flex;
      gap: 1.5rem;
    }

    .mode-btn {
      background: #0d0d0d;
      border: 1px solid #222;
      border-radius: 16px;
      color: #ccc;
      cursor: pointer;
      padding: 1.8rem 2rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.6rem;
      width: 155px;
      transition: border-color 0.15s, background 0.15s, box-shadow 0.15s, transform 0.12s;
    }

    .mode-btn:hover {
      border-color: #ff2d78;
      background: rgba(255,45,120,0.05);
      box-shadow: 0 0 16px rgba(255,45,120,0.2);
      transform: scale(1.06);
    }

    .mode-btn .mode-label {
      font-size: 1.05rem;
      font-weight: bold;
      letter-spacing: 1px;
    }

    .mode-btn .mode-sub {
      font-size: 0.72rem;
      color: #444;
      text-align: center;
      line-height: 1.4;
    }
  </style>
</head>
<body>
  <h1>Tic Tac Toe</h1>

  <div id="scoreboard">
    <div class="score-box x-score">
      <div class="label">X Wins</div>
      <div class="value" id="score-x">0</div>
    </div>
    <div class="score-box tie-score">
      <div class="label">Ties</div>
      <div class="value" id="score-tie">0</div>
    </div>
    <div class="score-box o-score">
      <div class="label">O Wins</div>
      <div class="value" id="score-o">0</div>
    </div>
  </div>

  <div id="mode-indicator"></div>
  <div id="status">X's turn</div>

  <div id="board">
    <div class="cell" data-i="0" data-key="7"></div>
    <div class="cell" data-i="1" data-key="8"></div>
    <div class="cell" data-i="2" data-key="9"></div>
    <div class="cell" data-i="3" data-key="4"></div>
    <div class="cell" data-i="4" data-key="5"></div>
    <div class="cell" data-i="5" data-key="6"></div>
    <div class="cell" data-i="6" data-key="1"></div>
    <div class="cell" data-i="7" data-key="2"></div>
    <div class="cell" data-i="8" data-key="3"></div>
  </div>

  <button id="reset">Change Mode</button>

  <!-- Mode selection overlay -->
  <div id="mode-screen">
    <div class="mode-card">
      <h1 class="mode-title">Tic Tac Toe</h1>
      <h2>Choose Mode</h2>
      <div class="mode-buttons">
        <button class="mode-btn" id="btn-friend">
          <span class="mode-label">vs Friend</span>
          <span class="mode-sub">2 players, same device</span>
        </button>
        <button class="mode-btn" id="btn-ai">
          <span class="mode-label">vs AI</span>
          <span class="mode-sub">Play against the computer</span>
        </button>
      </div>
    </div>
  </div>

  <script>
    const CONFETTI_COLORS = ['#e94560','#a8dadc','#f6c90e','#48cae4','#ff6b6b','#c77dff','#ffffff'];

    function celebrate() {
      document.querySelectorAll('.confetti-canvas').forEach(c => c.remove());
      const canvas = document.createElement('canvas');
      canvas.className = 'confetti-canvas';
      canvas.style.cssText = 'position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:999';
      document.body.appendChild(canvas);
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
      const ctx = canvas.getContext('2d');

      const particles = Array.from({length: 100}, () => ({
        x: Math.random() * canvas.width,
        y: -10 - Math.random() * 120,
        vx: (Math.random() - 0.5) * 4,
        vy: 2.5 + Math.random() * 3,
        size: 7 + Math.random() * 8,
        color: CONFETTI_COLORS[Math.floor(Math.random() * CONFETTI_COLORS.length)],
        rot: Math.random() * Math.PI * 2,
        rotV: (Math.random() - 0.5) * 0.18,
        rect: Math.random() > 0.45,
        alpha: 1,
      }));

      const start = performance.now();

      (function draw(now) {
        const elapsed = now - start;
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        let alive = false;
        particles.forEach(p => {
          p.x += p.vx;
          p.y += p.vy;
          p.vy += 0.07;
          p.rot += p.rotV;
          if (elapsed > 1800) p.alpha = Math.max(0, p.alpha - 0.018);
          if (p.alpha > 0 && p.y < canvas.height + 20) {
            alive = true;
            ctx.save();
            ctx.globalAlpha = p.alpha;
            ctx.fillStyle = p.color;
            ctx.translate(p.x, p.y);
            ctx.rotate(p.rot);
            if (p.rect) {
              ctx.fillRect(-p.size / 2, -p.size / 4, p.size, p.size / 2);
            } else {
              ctx.beginPath();
              ctx.arc(0, 0, p.size / 2, 0, Math.PI * 2);
              ctx.fill();
            }
            ctx.restore();
          }
        });
        if (alive && elapsed < 4500) requestAnimationFrame(draw);
        else canvas.remove();
      })(start);
    }

    // ── AI (minimax) ─────────────────────────────────────────────────────────

    const WINS = [[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];

    function checkWinBoard(b) {
      for (const [a, bc, c] of WINS) {
        if (b[a] && b[a] === b[bc] && b[a] === b[c]) return b[a];
      }
      return null;
    }

    function minimax(b, isMaximizing) {
      const winner = checkWinBoard(b);
      if (winner === 'O') return 10;
      if (winner === 'X') return -10;
      if (b.every(v => v)) return 0;

      if (isMaximizing) {
        let best = -Infinity;
        for (let i = 0; i < 9; i++) {
          if (!b[i]) { b[i] = 'O'; best = Math.max(best, minimax(b, false)); b[i] = ''; }
        }
        return best;
      } else {
        let best = Infinity;
        for (let i = 0; i < 9; i++) {
          if (!b[i]) { b[i] = 'X'; best = Math.min(best, minimax(b, true)); b[i] = ''; }
        }
        return best;
      }
    }

    function getBestMove() {
      let best = -Infinity, bestMove = -1;
      const b = [...board];
      for (let i = 0; i < 9; i++) {
        if (!b[i]) {
          b[i] = 'O';
          const score = minimax(b, false);
          b[i] = '';
          if (score > best) { best = score; bestMove = i; }
        }
      }
      return bestMove;
    }

    // ── Game state ───────────────────────────────────────────────────────────

    const KEY_MAP = {'7':0,'8':1,'9':2,'4':3,'5':4,'6':5,'1':6,'2':7,'3':8};
    const cells = document.querySelectorAll('.cell');
    const statusEl = document.getElementById('status');
    const modeIndicator = document.getElementById('mode-indicator');
    const modeScreen = document.getElementById('mode-screen');
    const scores = { X: 0, O: 0, tie: 0 };

    let board, current, over, nextGameTimer, aiThinking, mode;

    const modeCard = document.querySelector('.mode-card');

    function showModeScreen() {
      clearTimeout(nextGameTimer);
      aiThinking = false;
      over = true;
      board = Array(9).fill('');
      cells.forEach(c => { c.innerHTML = ''; c.className = 'cell'; });
      statusEl.textContent = '';
      document.querySelectorAll('.confetti-canvas').forEach(c => c.remove());
      // Reset card animation so it plays the entry again
      modeCard.classList.remove('dismissing');
      void modeCard.offsetWidth;
      modeScreen.style.display = 'flex';
    }

    function startMode(m) {
      // Play dismiss animation, then switch to the game
      modeCard.classList.add('dismissing');
      modeCard.addEventListener('animationend', function handler() {
        modeCard.removeEventListener('animationend', handler);
        modeScreen.style.display = 'none';
        mode = m;
        modeIndicator.textContent = m === 'ai' ? 'vs AI' : 'vs Friend';
        init();
      });
    }

    function init() {
      clearTimeout(nextGameTimer);
      aiThinking = false;
      board = Array(9).fill('');
      current = 'X';
      over = false;
      cells.forEach(c => { c.innerHTML = ''; c.className = 'cell'; });
      setStatus();
      document.querySelectorAll('.confetti-canvas').forEach(c => c.remove());
    }

    function setStatus() {
      if (mode === 'ai') {
        statusEl.textContent = current === 'X' ? "Your turn" : "AI thinking...";
      } else {
        statusEl.textContent = `${current}'s turn`;
      }
      // Block cells visually when it's the AI's turn
      cells.forEach(c => {
        if (mode === 'ai' && current === 'O' && !over) c.classList.add('blocked');
        else c.classList.remove('blocked');
      });
    }

    function checkWin() {
      for (const [a, b, c] of WINS) {
        if (board[a] && board[a] === board[b] && board[a] === board[c]) return [a, b, c];
      }
      return null;
    }

    function playCell(i) {
      if (over || board[i] || aiThinking) return;

      board[i] = current;
      cells[i].innerHTML = `<span class="symbol">${current}</span>`;
      cells[i].classList.add('taken', current.toLowerCase());

      const win = checkWin();
      if (win) {
        win.forEach(idx => cells[idx].classList.add('winning'));
        if (mode === 'ai') {
          statusEl.textContent = current === 'X' ? "You win!" : "AI wins!";
        } else {
          statusEl.textContent = `${current} wins!`;
        }
        scores[current]++;
        document.getElementById(`score-${current.toLowerCase()}`).textContent = scores[current];
        over = true;
        cells.forEach(c => c.classList.remove('blocked'));
        celebrate();
        nextGameTimer = setTimeout(init, 2200);
      } else if (board.every(v => v)) {
        statusEl.textContent = "It's a tie!";
        scores.tie++;
        document.getElementById('score-tie').textContent = scores.tie;
        over = true;
        cells.forEach(c => c.classList.remove('blocked'));
        nextGameTimer = setTimeout(init, 2200);
      } else {
        current = current === 'X' ? 'O' : 'X';
        setStatus();
        if (mode === 'ai' && current === 'O') {
          aiThinking = true;
          setTimeout(() => {
            aiThinking = false;
            playCell(getBestMove());
          }, 450);
        }
      }
    }

    cells.forEach(cell => {
      cell.addEventListener('click', () => playCell(+cell.dataset.i));
    });

    document.addEventListener('keydown', e => {
      const idx = KEY_MAP[e.key];
      if (idx !== undefined) playCell(idx);
    });

    document.getElementById('reset').addEventListener('click', showModeScreen);
    document.getElementById('btn-friend').addEventListener('click', () => startMode('friend'));
    document.getElementById('btn-ai').addEventListener('click', () => startMode('ai'));
  </script>
</body>
</html>
