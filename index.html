<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tic Tac Toe</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #1a1a2e;
      font-family: 'Segoe UI', sans-serif;
      color: #eee;
    }

    h1 {
      font-size: 2.5rem;
      margin-bottom: 1rem;
      letter-spacing: 4px;
      text-transform: uppercase;
      color: #e94560;
    }

    #status {
      font-size: 1.2rem;
      margin-bottom: 1.5rem;
      min-height: 1.5em;
      color: #a8dadc;
    }

    #board {
      display: grid;
      grid-template-columns: repeat(3, 110px);
      grid-template-rows: repeat(3, 110px);
      gap: 8px;
    }

    .cell {
      position: relative;
      background: #16213e;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 3rem;
      font-weight: bold;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
      user-select: none;
    }

    .cell:hover:not(.taken) {
      background: #0f3460;
      transform: scale(1.05);
    }

    .cell.x { color: #e94560; }
    .cell.o { color: #a8dadc; }

    /* Key hint — shown on empty cells, hidden once taken */
    .cell::before {
      content: attr(data-key);
      position: absolute;
      top: 7px;
      left: 9px;
      font-size: 0.7rem;
      font-weight: normal;
      color: #3a4a6a;
      pointer-events: none;
      transition: opacity 0.15s;
    }

    .cell.taken::before { opacity: 0; }

    @keyframes winning-pulse {
      0%, 100% { transform: scale(1); }
      50%       { transform: scale(1.08); }
    }

    .cell.winning {
      animation: winning-pulse 0.6s ease-in-out infinite;
    }

    .cell.winning.x {
      background: rgba(233, 69, 96, 0.35);
      box-shadow: 0 0 24px rgba(233, 69, 96, 0.9), inset 0 0 12px rgba(233, 69, 96, 0.4);
    }

    .cell.winning.o {
      background: rgba(168, 218, 220, 0.35);
      box-shadow: 0 0 24px rgba(168, 218, 220, 0.9), inset 0 0 12px rgba(168, 218, 220, 0.4);
    }

    @keyframes pop-in {
      0%   { transform: scale(0) rotate(-20deg); opacity: 0; }
      55%  { transform: scale(1.35) rotate(6deg); opacity: 1; }
      75%  { transform: scale(0.88) rotate(-3deg); }
      100% { transform: scale(1) rotate(0deg); opacity: 1; }
    }

    .cell .symbol {
      display: inline-block;
      animation: pop-in 0.4s cubic-bezier(0.34, 1.56, 0.64, 1) both;
    }

    #reset {
      margin-top: 1.8rem;
      padding: 0.65rem 2.2rem;
      font-size: 1rem;
      border: none;
      border-radius: 8px;
      background: #e94560;
      color: #fff;
      cursor: pointer;
      letter-spacing: 1px;
      transition: background 0.15s, transform 0.1s;
    }

    #reset:hover { background: #c73652; transform: scale(1.04); }

    #scoreboard {
      display: flex;
      gap: 2.5rem;
      margin-bottom: 1.5rem;
      font-size: 1rem;
    }

    .score-box { text-align: center; }
    .score-box .label { color: #888; font-size: 0.8rem; letter-spacing: 1px; text-transform: uppercase; }
    .score-box .value { font-size: 1.8rem; font-weight: bold; }
    .score-box.x-score .value { color: #e94560; }
    .score-box.o-score .value { color: #a8dadc; }
    .score-box.tie-score .value { color: #888; }
  </style>
</head>
<body>
  <h1>Tic Tac Toe</h1>

  <div id="scoreboard">
    <div class="score-box x-score">
      <div class="label">X Wins</div>
      <div class="value" id="score-x">0</div>
    </div>
    <div class="score-box tie-score">
      <div class="label">Ties</div>
      <div class="value" id="score-tie">0</div>
    </div>
    <div class="score-box o-score">
      <div class="label">O Wins</div>
      <div class="value" id="score-o">0</div>
    </div>
  </div>

  <div id="status">X's turn</div>

  <div id="board">
    <div class="cell" data-i="0" data-key="7"></div>
    <div class="cell" data-i="1" data-key="8"></div>
    <div class="cell" data-i="2" data-key="9"></div>
    <div class="cell" data-i="3" data-key="4"></div>
    <div class="cell" data-i="4" data-key="5"></div>
    <div class="cell" data-i="5" data-key="6"></div>
    <div class="cell" data-i="6" data-key="1"></div>
    <div class="cell" data-i="7" data-key="2"></div>
    <div class="cell" data-i="8" data-key="3"></div>
  </div>

  <button id="reset">New Game</button>

  <script>
    const CONFETTI_COLORS = ['#e94560','#a8dadc','#f6c90e','#48cae4','#ff6b6b','#c77dff','#ffffff'];

    function celebrate() {
      document.querySelectorAll('.confetti-canvas').forEach(c => c.remove());
      const canvas = document.createElement('canvas');
      canvas.className = 'confetti-canvas';
      canvas.style.cssText = 'position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:999';
      document.body.appendChild(canvas);
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
      const ctx = canvas.getContext('2d');

      const particles = Array.from({length: 100}, () => ({
        x: Math.random() * canvas.width,
        y: -10 - Math.random() * 120,
        vx: (Math.random() - 0.5) * 4,
        vy: 2.5 + Math.random() * 3,
        size: 7 + Math.random() * 8,
        color: CONFETTI_COLORS[Math.floor(Math.random() * CONFETTI_COLORS.length)],
        rot: Math.random() * Math.PI * 2,
        rotV: (Math.random() - 0.5) * 0.18,
        rect: Math.random() > 0.45,
        alpha: 1,
      }));

      const start = performance.now();
      let frame;

      (function draw(now) {
        const elapsed = now - start;
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        let alive = false;
        particles.forEach(p => {
          p.x += p.vx;
          p.y += p.vy;
          p.vy += 0.07;
          p.rot += p.rotV;
          if (elapsed > 1800) p.alpha = Math.max(0, p.alpha - 0.018);
          if (p.alpha > 0 && p.y < canvas.height + 20) {
            alive = true;
            ctx.save();
            ctx.globalAlpha = p.alpha;
            ctx.fillStyle = p.color;
            ctx.translate(p.x, p.y);
            ctx.rotate(p.rot);
            if (p.rect) {
              ctx.fillRect(-p.size / 2, -p.size / 4, p.size, p.size / 2);
            } else {
              ctx.beginPath();
              ctx.arc(0, 0, p.size / 2, 0, Math.PI * 2);
              ctx.fill();
            }
            ctx.restore();
          }
        });
        if (alive && elapsed < 4500) {
          frame = requestAnimationFrame(draw);
        } else {
          canvas.remove();
        }
      })(start);
    }

    const WINS = [[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];
    const cells = document.querySelectorAll('.cell');
    const status = document.getElementById('status');
    const scores = { X: 0, O: 0, tie: 0 };

    // numpad layout: 7=top-left … 1=bottom-left
    const KEY_MAP = {'7':0,'8':1,'9':2,'4':3,'5':4,'6':5,'1':6,'2':7,'3':8};

    let board, current, over, nextGameTimer;

    function init() {
      clearTimeout(nextGameTimer);
      board = Array(9).fill('');
      current = 'X';
      over = false;
      cells.forEach(c => { c.innerHTML = ''; c.className = 'cell'; });
      status.textContent = "X's turn";
      document.querySelectorAll('.confetti-canvas').forEach(c => c.remove());
    }

    function checkWin() {
      for (const [a,b,c] of WINS) {
        if (board[a] && board[a] === board[b] && board[a] === board[c])
          return [a,b,c];
      }
      return null;
    }

    function playCell(i) {
      if (over || board[i]) return;

      board[i] = current;
      cells[i].innerHTML = `<span class="symbol">${current}</span>`;
      cells[i].classList.add('taken', current.toLowerCase());

      const win = checkWin();
      if (win) {
        win.forEach(idx => cells[idx].classList.add('winning'));
        status.textContent = `${current} wins!`;
        scores[current]++;
        document.getElementById(`score-${current.toLowerCase()}`).textContent = scores[current];
        over = true;
        celebrate();
        nextGameTimer = setTimeout(init, 2200);
      } else if (board.every(v => v)) {
        status.textContent = "It's a tie!";
        scores.tie++;
        document.getElementById('score-tie').textContent = scores.tie;
        over = true;
        nextGameTimer = setTimeout(init, 2200);
      } else {
        current = current === 'X' ? 'O' : 'X';
        status.textContent = `${current}'s turn`;
      }
    }

    cells.forEach(cell => {
      cell.addEventListener('click', () => playCell(+cell.dataset.i));
    });

    document.addEventListener('keydown', e => {
      const idx = KEY_MAP[e.key];
      if (idx !== undefined) playCell(idx);
    });

    document.getElementById('reset').addEventListener('click', init);

    init();
  </script>
</body>
</html>
